# Server Port
server.port=8080

# Database Configuration (pointing to H2 in-memory database for zero-config runs)
spring.datasource.url=jdbc:h2:mem:visitor_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Database Configuration (pointing to Docker mapped port 5433 - uncomment to use PostgreSQL)
#spring.datasource.url=jdbc:postgresql://localhost:5433/visitor_db
#spring.datasource.username=visitor_user
#spring.datasource.password=visitor_password
#spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mail Settings (pointing to Docker Maildev SMTP on port 1025)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
